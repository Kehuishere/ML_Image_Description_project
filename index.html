<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Season to Gift</title>
  <link rel="icon" type="image/x-icon" href="D:\doantritue\cute.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background 0.5s ease;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    .message-in {
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hiệu ứng preview ảnh */
    #image-preview-wrapper {
      transition: all 0.3s ease;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
    }
    #image-preview-wrapper.active {
      max-height: 100px;
      opacity: 1;
      padding-bottom: 12px;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-100 to-indigo-100 h-screen flex items-center justify-center p-2 md:p-6">

  <div class="w-full max-w-6xl h-[92vh] glass rounded-[2.5rem] shadow-[0_32px_64px_rgba(0,0,0,0.08)] flex overflow-hidden border border-white">

    <!-- SIDEBAR LỊCH SỬ -->
    <div class="hidden md:flex w-72 flex-col p-6 border-r border-gray-200/50">
      <div class="flex justify-between items-center mb-6">
        <h2 class="font-bold text-gray-800 flex items-center gap-2">
          <span class="text-indigo-500">●</span> Lịch sử
        </h2>
        <button onclick="clearAllHistory()" class="text-[10px] uppercase tracking-wider text-gray-400 hover:text-red-500 font-bold transition">Xoá hết</button>
      </div>
      <div id="history" class="flex-1 overflow-y-auto space-y-2 custom-scrollbar pr-1"></div>
    </div>

    <!-- KHUNG CHAT CHÍNH -->
    <div class="flex-1 flex flex-col relative">
      <div class="px-6 py-4 flex justify-between items-center border-b border-gray-200/50">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">✨</div>
          <div>
            <h1 class="font-bold text-gray-800 leading-tight">Kehuishere</h1>
            <p class="text-[10px] text-green-500 font-bold uppercase tracking-widest">Active Now</p>
          </div>
        </div>
        <button onclick="toggleDark()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-white transition-all shadow-sm border border-gray-100">🌙</button>
      </div>

      <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-6 custom-scrollbar bg-white/20">
        <div class="flex items-end gap-3 message-in">
          <div class="bg-white p-4 rounded-2xl rounded-bl-none shadow-sm max-w-[85%] border border-gray-50 text-gray-700 leading-relaxed text-sm">
            Chào bạn! Mình đã sẵn sàng hỗ trợ. Bạn muốn hỏi gì về hình ảnh không?
          </div>
        </div>
      </div>

      <!-- INPUT AREA -->
      <div class="p-6 bg-white/40 border-t border-gray-200/50">
        <!-- Preview ảnh trước khi gửi -->
        <div id="image-preview-wrapper" class="flex items-start">
            <div class="relative inline-block">
                <img id="image-preview" src="" class="w-16 h-16 object-cover rounded-lg border-2 border-indigo-500 shadow-md">
                <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center hover:bg-red-600">✕</button>
            </div>
        </div>

        <div class="relative flex items-center bg-white rounded-2xl shadow-xl shadow-indigo-100/50 border border-gray-100 p-1.5 focus-within:border-indigo-300 transition-all">
          
          <!-- Nút chọn file ảnh -->
          <label for="imageUpload" class="p-3 text-gray-400 hover:text-indigo-600 cursor-pointer transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
            </svg>
          </label>
          <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageSelect(event)">

          <input id="inputMsg" type="text" placeholder="Gửi tin nhắn hoặc upload ảnh..." class="flex-1 bg-transparent px-2 py-3 outline-none text-gray-700 text-sm">
          
          <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all active:scale-95 shadow-lg shadow-indigo-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- GỢI Ý NHANH -->
    <div class="hidden lg:flex w-64 flex-col p-6 border-l border-gray-200/50">
      <h3 class="font-bold text-gray-800 mb-4">Gợi ý nhanh</h3>
      <div class="space-y-2">
        <div onclick="quick('GPA là gì?')" class="p-3 text-xs bg-white rounded-xl border border-gray-100 hover:border-indigo-300 hover:shadow-sm cursor-pointer transition text-gray-600">🎓 GPA là gì?</div>
        <div onclick="quick('Cách xin học bổng')" class="p-3 text-xs bg-white rounded-xl border border-gray-100 hover:border-indigo-300 hover:shadow-sm cursor-pointer transition text-gray-600">💰 Cách xin học bổng</div>
        <div onclick="quick('Viết code Python')" class="p-3 text-xs bg-white rounded-xl border border-gray-100 hover:border-indigo-300 hover:shadow-sm cursor-pointer transition text-gray-600">🐍 Viết code Python</div>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const historyBox = document.getElementById("history");
    const imageUpload = document.getElementById("imageUpload");
    const imagePreviewWrapper = document.getElementById("image-preview-wrapper");
    const imagePreview = document.getElementById("image-preview");

    let selectedFile = null;

    /* ================= IMAGE HANDLING ================= */
    function handleImageSelect(event) {
      const file = event.target.files[0];
      if (file) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          imagePreview.src = e.target.result;
          imagePreviewWrapper.classList.add("active");
        };
        reader.readAsDataURL(file);
      }
    }

    function removeImage() {
      selectedFile = null;
      imageUpload.value = "";
      imagePreviewWrapper.classList.remove("active");
    }

    /* ================= HISTORY ================= */
    function renderHistory() {
      let h = JSON.parse(localStorage.getItem("chat_history") || "[]");
      historyBox.innerHTML = h.map((item, index) => `
        <div class="group relative flex items-center bg-white/60 p-3 rounded-xl border border-transparent hover:border-indigo-200 transition-all cursor-pointer">
          <div class="truncate flex-1 text-xs text-gray-500 group-hover:text-indigo-600" onclick="quick('${item}')">${item}</div>
          <button onclick="deleteHistoryItem(${index})" class="opacity-0 group-hover:opacity-100 p-1 hover:bg-red-50 rounded-lg text-gray-300 hover:text-red-500 transition-all">❌</button>
        </div>
      `).join("");
    }

    function saveHistory(msg) {
      if (!msg) return;
      let h = JSON.parse(localStorage.getItem("chat_history") || "[]");
      if (!h.includes(msg)) h.unshift(msg);
      if (h.length > 15) h.pop();
      localStorage.setItem("chat_history", JSON.stringify(h));
      renderHistory();
    }

    /* ================= CHAT LOGIC ================= */
    async function sendMessage() {
      const input = document.getElementById("inputMsg");
      const msg = input.value.trim();
      
      if (!msg && !selectedFile) return;

      // HIỂN THỊ TIN NHẮN USER
      let userMsgHTML = `<div class='flex justify-end message-in mb-4'><div class='bg-indigo-600 text-white p-4 rounded-2xl rounded-br-none max-w-[85%] text-sm shadow-md'>`;
      if (selectedFile) {
          userMsgHTML += `<img src="${imagePreview.src}" class="w-48 rounded-lg mb-2 border border-indigo-400">`;
      }
      userMsgHTML += `<span>${msg}</span></div></div>`;
      chatBox.innerHTML += userMsgHTML;

      if (msg) saveHistory(msg);
      
      // Reset input & preview ngay lập tức
      const currentMsg = msg;
      const currentFile = selectedFile;
      input.value = "";
      removeImage();
      chatBox.scrollTop = chatBox.scrollHeight;

      // HIỂN THỊ TRẠNG THÁI CHỜ
      const typingId = "typing-" + Date.now();
      chatBox.innerHTML += `
        <div id="${typingId}" class="flex items-end gap-3 message-in">
          <div class="bg-gray-100 p-4 rounded-2xl rounded-bl-none text-sm text-gray-500">Kehuishere đang phân tích...</div>
        </div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      // GỬI DATA LÊN BACKEND (Sử dụng FormData để hỗ trợ file)
      const formData = new FormData();
      formData.append("query", currentMsg);
      if (currentFile) {
        formData.append("file", currentFile);
      }

      try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          body: formData // Không set Content-Type, trình duyệt tự làm cho FormData
        });

        const data = await res.json();
        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
          <div class="flex items-end gap-3 message-in">
            <div class="bg-white p-4 rounded-2xl rounded-bl-none shadow-sm max-w-[85%] text-sm border border-gray-50 text-gray-700">
              ${data.answer || "Mình không nhận diện được yêu cầu này."}
            </div>
          </div>`;
      } catch (err) {
        document.getElementById(typingId)?.remove();
        chatBox.innerHTML += `<div class="text-red-500 text-[10px] text-center">Lỗi kết nối API Server</div>`;
      }

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    /* ================= HÀM PHỤ ================= */
    function quick(t) {
      document.getElementById("inputMsg").value = t;
      sendMessage();
    }

    function toggleDark() {
      document.body.classList.toggle("from-slate-900");
      document.body.classList.toggle("to-slate-800");
    }

    window.onload = renderHistory;
    window.addEventListener("keydown", e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
